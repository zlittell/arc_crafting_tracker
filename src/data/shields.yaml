# yaml-language-server: $schema=../schemas/item-list.schema.json
category: shield
items:
  - id: light_shield
    name: Light Shield
    craft_recipe:
      ingredients:
        - { material_id: arc_alloy, quantity: 2 }
        - { material_id: plastic_parts, quantity: 4 }

  - id: medium_shield
    name: Medium Shield
    craft_recipe:
      ingredients:
        - { material_id: arc_circuitry, quantity: 1 }
        - { material_id: battery, quantity: 4 }

  - id: heavy_shield
    name: Heavy Shield
    craft_recipe:
      ingredients:
        - { material_id: power_rod, quantity: 1 }
        - { material_id: voltage_converter, quantity: 2 }
