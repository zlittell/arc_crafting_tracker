# yaml-language-server: $schema=../schemas/item-list.schema.json
# Note: batch sizes are shown in item names (e.g. "Light Ammo (×25)" = 1 craft yields 25 rounds)
category: ammunition
items:
  - id: light_ammo
    name: "Light Ammo (×25)"
    craft_recipe:
      ingredients:
        - { material_id: chemicals, quantity: 2 }
        - { material_id: metal_parts, quantity: 3 }

  - id: medium_ammo
    name: "Medium Ammo (×20)"
    craft_recipe:
      ingredients:
        - { material_id: chemicals, quantity: 2 }
        - { material_id: metal_parts, quantity: 3 }

  - id: heavy_ammo
    name: "Heavy Ammo (×10)"
    craft_recipe:
      ingredients:
        - { material_id: chemicals, quantity: 2 }
        - { material_id: metal_parts, quantity: 3 }

  - id: shotgun_ammo
    name: "Shotgun Ammo (×5)"
    craft_recipe:
      ingredients:
        - { material_id: chemicals, quantity: 2 }
        - { material_id: metal_parts, quantity: 3 }

  - id: launcher_ammo
    name: "Launcher Ammo (×6)"
    craft_recipe:
      ingredients:
        - { material_id: arc_motion_core, quantity: 1 }
        - { material_id: crude_explosives, quantity: 2 }

  - id: energy_clip
    name: "Energy Clip (×5)"
    craft_recipe:
      ingredients:
        - { material_id: advanced_arc_powercell, quantity: 1 }
        - { material_id: battery, quantity: 2 }
